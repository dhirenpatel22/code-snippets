name: Update Gist Index

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-gist-index:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4          # ✅ Updated from v3 to v4

      - name: Fetch Gists and Update README
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}
        run: |
          # Fetch all gists from GitHub API
          RESPONSE=$(curl -s \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/users/$USERNAME/gists?per_page=100")

          # ✅ Debug: Check if API response is valid
          echo "$RESPONSE" | jq . > /dev/null 2>&1
          if [ $? -ne 0 ]; then
            echo "❌ Failed to parse API response"
            echo "$RESPONSE"
            exit 1
          fi

          echo "$RESPONSE" > gists.json

          # ✅ Check if gists exist
          GIST_COUNT=$(echo "$RESPONSE" | jq 'length')
          echo "Found $GIST_COUNT gists"

          # Generate README.md header
          echo "# 📋 My Gist Index" > README.md
          echo "" >> README.md
          echo "> Auto-updated daily via GitHub Actions" >> README.md
          echo "" >> README.md

          if [ "$GIST_COUNT" -eq 0 ]; then
            echo "_No gists found._" >> README.md
          else
            echo "| # | Description | Files | Last Updated |" >> README.md
            echo "|---|-------------|-------|--------------|" >> README.md

            # ✅ Fixed jq filter with proper null handling
            echo "$RESPONSE" | jq -r '
              to_entries[] |
              .key as $i |
              .value |
              "| \($i + 1) | [\(if .description == null or .description == "" then "Untitled" else .description end)](\(.html_url)) | \([.files | keys[] ] | join(", ")) | \(.updated_at[:10]) |"
            ' >> README.md
          fi

          echo "" >> README.md
          echo "_Last synced: $(date -u '+%Y-%m-%d %H:%M UTC')_" >> README.md

      - name: Commit and Push Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md gists.json
          git diff --cached --quiet || git commit -m "🔄 Update gist index - $(date -u '+%Y-%m-%d')"
          git push