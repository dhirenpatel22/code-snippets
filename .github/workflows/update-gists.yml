name: Update Gist Index

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-gist-index:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch Gists from GitHub API
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          USERNAME: ${{ github.repository_owner }}
        run: |
          echo "Fetching gists for user: $USERNAME"

          HTTP_STATUS=$(curl -s -o gists.json -w "%{http_code}" \
            -H "Authorization: token $GIST_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/users/$USERNAME/gists?per_page=100")

          echo "HTTP Status: $HTTP_STATUS"

          if [ "$HTTP_STATUS" != "200" ]; then
            echo "API call failed with status $HTTP_STATUS"
            cat gists.json
            exit 1
          fi

          echo "Gists fetched successfully"

      - name: Generate README from Gists
        run: python3 .github/scripts/generate_readme.py

      - name: Commit and Push Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md gists.json
          git diff --cached --quiet || git commit -m "Update gist index - $(date -u '+%Y-%m-%d')"
          git push