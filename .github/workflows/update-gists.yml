name: Sync Gists Daily

on:
  schedule:
    - cron: "0 2 * * *"   # Every day at 2:00 AM UTC
  workflow_dispatch:       # Allows manual trigger from GitHub UI

jobs:
  sync-gists:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.4.0
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: pip install requests

      - name: Run gist sync script
        env:
          GITHUB_TOKEN: ${{ secrets.GIST_TOKEN }}
          GIT_USER: ${{ vars.GIT_USER }}
        run: |
          echo "=== Python version ==="
          python --version
          echo "=== Files in repo root ==="
          ls -la
          echo "=== Checking env vars (masked) ==="
          echo "GITHUB_TOKEN set: ${{ secrets.GIST_TOKEN != '' }}"
          echo "GIT_USER set: ${{ vars.GIT_USER != '' }}"
          echo "=== Running script ==="
          python .github/scripts/generate_readme.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          # Only commit if there are actual changes
          git diff --cached --quiet || git commit -m "chore: sync gists $(date +'%Y-%m-%d %H:%M UTC')"
          git push